services:
  - type: web
    name: bottleneck-radar-mechanism
    runtime: python
    plan: starter
    autoDeploy: true
    buildCommand: pip install -e .
    startCommand: uvicorn bottleneck_radar_server.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SKILLFOUNDRY_SHARED_SECRET
        sync: false
