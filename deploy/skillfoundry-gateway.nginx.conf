server {
    listen 127.0.0.1:8020;
    server_name skillfoundry.synaplex.ai;

    access_log /var/log/nginx/skillfoundry.access.log;
    error_log /var/log/nginx/skillfoundry.error.log;

    location = /health {
        default_type application/json;
        return 200 '{"status":"ok","service":"skillfoundry-gateway"}';
    }

    location = / {
        default_type application/json;
        return 404 '{"error":"Not found"}';
    }

    location = /products/launchpad-lint/mcp {
        return 308 https://skillfoundry.synaplex.ai/products/launchpad-lint/mcp/;
    }

    location /products/launchpad-lint/ {
        proxy_pass http://127.0.0.1:8010/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /products/launchpad-lint;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600;
    }
}
