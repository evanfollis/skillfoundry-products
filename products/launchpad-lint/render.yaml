services:
  - type: web
    name: launchpad-lint
    runtime: docker
    plan: starter
    rootDir: products/launchpad-lint
    autoDeployTrigger: commit
    dockerfilePath: ./Dockerfile
    dockerContext: ./
    healthCheckPath: /health
    envVars:
      - key: LAUNCHPAD_LINT_ENVIRONMENT
        value: production
      - key: LAUNCHPAD_LINT_SHARED_SECRET
        sync: false
      - key: AGENTICMARKET_SECRET
        sync: false
