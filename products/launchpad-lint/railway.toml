[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = [
  "/products/launchpad-lint/**",
]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
startCommand = "sh -lc 'uvicorn launchpad_lint.app:app --host 0.0.0.0 --port ${PORT:-8000}'"
