app = "launchpad-lint"
primary_region = "ord"

[build]
dockerfile = "Dockerfile"

[env]
PORT = "8000"
LAUNCHPAD_LINT_ENVIRONMENT = "production"

[http_service]
internal_port = 8000
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 0

  [http_service.concurrency]
  type = "requests"
  soft_limit = 50
  hard_limit = 100

  [[http_service.checks]]
  grace_period = "10s"
  interval = "15s"
  method = "GET"
  timeout = "5s"
  path = "/health"
